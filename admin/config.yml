backend:
  name: github
  repo: accannes-cloud/site-acc
  branch: main
  base_url: https://decap-oauth.accannes.workers.dev

# Langue de l'interface
locale: 'fr'

# Dossier où seront stockées les images uploadées par les bénévoles
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Message affiché en haut de l'interface
site_url: https://accannes.netlify.app
display_url: https://accannes.netlify.app
logo_url: /Logo_bleu.png

collections:
  # ====================================================
  # 1. ACTUALITÉS / NEWSLETTER
  # ====================================================
  - name: "actualites"
    label: "📰 Actualités / Newsletter"
    label_singular: "une actualité"
    folder: "contenu/actualites"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    fields:
      - { name: "title", label: "Titre de l'article", widget: "string", hint: "Le titre principal de l'actualité" }
      - { name: "date", label: "Date de publication", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
      - name: "categorie"
        label: "Catégorie"
        widget: "select"
        options: ["Compétition", "Vie du club", "Jeunes", "Running", "Événement", "Résultats"]
        default: "Vie du club"
      - { name: "featured", label: "Mettre en avant (article principal)", widget: "boolean", default: false, hint: "Active pour afficher cet article en grand en haut de la page actualités" }
      - { name: "image", label: "Photo de l'article", widget: "image", required: false, hint: "Image qui illustre l'article (facultatif)" }
      - { name: "resume", label: "Résumé court", widget: "text", hint: "1 à 2 phrases qui résument l'article (affiché dans la liste)" }
      - { name: "body", label: "Contenu de l'article", widget: "markdown", hint: "Le texte complet. Tu peux mettre en gras, ajouter des titres, des listes, des images..." }
      - { name: "auteur", label: "Auteur (facultatif)", widget: "string", required: false, default: "Athletic Club de Cannes" }

  # ====================================================
  # 2. RÉSULTATS DES ATHLÈTES
  # ====================================================
  - name: "resultats"
    label: "🏆 Résultats des athlètes"
    label_singular: "des résultats"
    folder: "contenu/resultats"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{competition}} — {{date}}"
    sortable_fields: ['date', 'competition']
    fields:
      - { name: "competition", label: "Nom de la compétition", widget: "string", hint: "Ex : Championnats Départementaux, Meeting de Cannes..." }
      - { name: "date", label: "Date de la compétition", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
      - { name: "lieu", label: "Lieu", widget: "string", hint: "Ex : Stade Maurice Chevalier, Cannes" }
      - name: "niveau"
        label: "Niveau de la compétition"
        widget: "select"
        options: ["Départemental", "Régional", "National", "International", "Meeting", "Cross", "Autre"]
        default: "Départemental"
      - { name: "image", label: "Photo (facultatif)", widget: "image", required: false, hint: "Photo de l'équipe ou des athlètes" }
      - { name: "intro", label: "Introduction / Résumé", widget: "text", required: false, hint: "Quelques mots sur la compétition (facultatif)" }
      - name: "performances"
        label: "Liste des performances"
        label_singular: "une performance"
        widget: "list"
        summary: "{{fields.athlete}} — {{fields.epreuve}} — {{fields.classement}}"
        hint: "Ajoute une ligne par performance d'athlète"
        fields:
          - { name: "athlete", label: "Nom de l'athlète", widget: "string" }
          - { name: "categorie", label: "Catégorie", widget: "string", required: false, hint: "Ex : Cadet, Minime, Senior..." }
          - { name: "epreuve", label: "Épreuve", widget: "string", hint: "Ex : 100m, Saut en longueur, 1500m..." }
          - { name: "performance", label: "Performance", widget: "string", required: false, hint: "Ex : 11.45s, 6.20m, 4'05..." }
          - { name: "classement", label: "Classement", widget: "string", required: false, hint: "Ex : 1er, 3e, Médaille d'or..." }
          - { name: "record", label: "Record personnel / du club", widget: "boolean", default: false, required: false }
      - { name: "commentaire", label: "Commentaire de fin (facultatif)", widget: "markdown", required: false, hint: "Un mot du coach, félicitations, prochaines échéances..." }

  # ====================================================
  # 3. INSCRIPTIONS AUX COMPÉTITIONS
  # ====================================================
  - name: "competitions"
    label: "📝 Inscriptions compétitions"
    label_singular: "une compétition"
    folder: "contenu/competitions"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{nom}} — {{date_competition}}"
    sortable_fields: ['date_competition', 'nom']
    fields:
      - { name: "nom", label: "Nom de la compétition", widget: "string", hint: "Ex : Championnats Régionaux Indoor 2026" }
      - { name: "date_competition", label: "Date de la compétition", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
      - { name: "date_limite", label: "Date limite d'inscription", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD", hint: "Dernier jour pour s'inscrire" }
      - { name: "lieu", label: "Lieu", widget: "string", hint: "Ex : Stade Charléty, Paris" }
      - name: "categories"
        label: "Catégories concernées"
        widget: "select"
        multiple: true
        options: ["Baby Athlé", "Éveil", "Poussins", "Benjamins", "Minimes", "Cadets", "Juniors", "Espoirs", "Seniors", "Masters", "Toutes catégories"]
        hint: "Tu peux en sélectionner plusieurs"
      - { name: "affiche", label: "Affiche / Image (facultatif)", widget: "image", required: false }
      - { name: "description", label: "Description", widget: "markdown", hint: "Détails sur la compétition, programme, modalités..." }
      - { name: "lien_inscription", label: "Lien d'inscription", widget: "string", hint: "Colle ici le lien vers le formulaire d'inscription (HelloAsso, etc.)" }
      - name: "statut"
        label: "Statut"
        widget: "select"
        options: ["Inscriptions ouvertes", "Inscriptions bientôt", "Inscriptions fermées", "Terminée"]
        default: "Inscriptions ouvertes"
