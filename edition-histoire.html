<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Édition — Histoire du club — ACC</title>
<link rel="icon" href="Logo_bleu.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bleu: #003DA5; --bleu-fonce: #001F5C; --jaune: #FFD600;
    --blanc: #fff; --texte: #0D1B3E; --texte-doux: #455A7A; --gris-clair: #F4F6FB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; color: var(--texte); background: var(--gris-clair); }

  .edit-toolbar { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 14px; background: var(--bleu-fonce); padding: 12px 20px; box-shadow: 0 2px 14px rgba(0,0,0,0.25); }
  .edit-toolbar .brand { color: var(--jaune); font-weight: 600; font-size: 15px; }
  .edit-toolbar .info { color: #B5D4F4; font-size: 13px; }
  .edit-toolbar .spacer { margin-left: auto; }
  .edit-toolbar button, .edit-toolbar a { border: none; border-radius: 8px; padding: 9px 18px; font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; line-height: 1; }
  .btn-save { background: var(--jaune); color: var(--bleu-fonce); }
  .btn-view { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-screen { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .login-card { background: #fff; border-radius: 20px; padding: 44px 36px; max-width: 440px; text-align: center; box-shadow: 0 12px 40px rgba(0,31,92,0.12); }
  .login-card .logo { width: 80px; height: 80px; border-radius: 50%; background: #000; margin: 0 auto 20px; overflow: hidden; }
  .login-card .logo img { width: 100%; height: 100%; object-fit: cover; }
  .login-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 10px; }
  .login-card p { font-size: 14px; color: var(--texte-doux); line-height: 1.6; margin-bottom: 24px; }
  .login-card button { background: var(--bleu-fonce); color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer; }

  .editable { position: relative; cursor: pointer; transition: background 0.15s; border-radius: 4px; outline-offset: 3px; }
  body.edit-mode .editable { outline: 2px dashed rgba(255,214,0,0.8); }
  body.edit-mode .editable:hover { background: rgba(255,214,0,0.22); }

  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  .eyebrow { color: var(--bleu); font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .titre { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 1px; color: var(--texte); margin-bottom: 20px; }
  .intro { font-size: 18px; color: var(--texte-doux); line-height: 1.8; margin-bottom: 30px; }
  .para { font-size: 16px; color: var(--texte-doux); line-height: 1.85; margin-bottom: 18px; }
  .bloc-titre { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--bleu); letter-spacing: 1px; margin: 36px 0 16px; padding-bottom: 10px; border-bottom: 2px solid var(--jaune); }

  .archive { background: #fff; border-radius: 14px; overflow: hidden; margin: 20px 0; box-shadow: 0 4px 18px rgba(0,31,92,0.06); }
  .archive-img { position: relative; height: 220px; background: linear-gradient(135deg, var(--bleu-fonce), var(--bleu)); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
  .archive-img img { width: 100%; height: 100%; object-fit: cover; }
  .archive-img .badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,20,60,0.75); color: #fff; font-size: 11px; padding: 5px 12px; border-radius: 8px; }
  .archive-img.vide { color: #fff; font-size: 14px; }
  .archive-cap { padding: 12px 16px; font-size: 13px; color: var(--texte-doux); }

  .citation { background: rgba(0,61,165,0.05); border-left: 4px solid var(--jaune); padding: 20px 24px; font-style: italic; color: var(--texte); font-size: 17px; line-height: 1.7; margin: 24px 0; border-radius: 0 10px 10px 0; }

  .tl-item { display: grid; grid-template-columns: 130px 1fr; gap: 16px; background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; box-shadow: 0 4px 18px rgba(0,31,92,0.06); border-left: 4px solid var(--jaune); }
  .tl-year { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--bleu); }
  .tl-text { font-size: 14px; color: var(--texte-doux); line-height: 1.6; }
  .tl-suppr { background: #FBEAEA; border: 1px solid #E5B5B5; color: #A32D2D; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }

  .ajout-btn { margin-top: 14px; background: var(--bleu); color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; }
  .ajout-btn:hover { background: var(--bleu-fonce); }
  .photo-btn { background: var(--gris-clair); border: 1px dashed var(--bleu); color: var(--bleu); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer; margin: 8px 16px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,20,60,0.55); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 520px; width: 100%; }
  .modal h3 { font-size: 16px; margin-bottom: 12px; }
  .modal textarea, .modal input { width: 100%; font-family: inherit; font-size: 15px; padding: 12px; border: 1.5px solid #E0E5F0; border-radius: 10px; margin-bottom: 14px; }
  .modal textarea { min-height: 120px; resize: vertical; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; border: none; border-radius: 10px; padding: 12px; font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; }
  .m-ok { background: var(--bleu); color: #fff; }
  .m-cancel { background: var(--gris-clair); color: var(--texte-doux); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #0F6E56; color: #fff; padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 3000; transition: transform 0.35s; box-shadow: 0 8px 30px rgba(0,0,0,0.25); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #A32D2D; }

  #app { display: none; }
</style>
</head>
<body>

<div id="login" class="login-screen">
  <div class="login-card">
    <div class="logo"><img src="Logo_bleu.png" alt="ACC"></div>
    <h1>ÉDITION — HISTOIRE</h1>
    <p>Connecte-toi avec le compte GitHub du club pour modifier la page « Histoire du club ».</p>
    <button onclick="login()">Se connecter avec GitHub</button>
  </div>
</div>

<div id="app">
  <div class="edit-toolbar">
    <span class="brand">✏️ Édition — Histoire</span>
    <span class="info">Clique sur un texte ou une photo pour la modifier</span>
    <span class="spacer"></span>
    <a href="le-club.html" class="btn-view">👁️ Voir la page</a>
    <button class="btn-save" id="saveBtn" onclick="sauvegarder()" disabled>💾 Enregistrer</button>
  </div>

  <div class="wrap">
    <div class="eyebrow editable" data-champ="eyebrow"></div>
    <div class="titre editable" data-champ="titre"></div>
    <div class="intro editable" data-champ="intro"></div>

    <div class="bloc-titre">📖 Le récit</div>
    <div id="parasBox"></div>
    <button class="ajout-btn" onclick="ajouterPara()">➕ Ajouter un paragraphe</button>

    <div class="bloc-titre">💬 Citation mise en avant</div>
    <div class="citation editable" data-champ="citation"></div>

    <div class="bloc-titre">📷 Photos d'archives</div>
    <div id="photosBox"></div>
    <button class="ajout-btn" onclick="ajouterPhoto()">➕ Ajouter une photo</button>

    <div class="bloc-titre">📅 Chronologie</div>
    <div id="timelineBox"></div>
    <button class="ajout-btn" onclick="ajouterDate()">➕ Ajouter une date</button>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitre">Modifier</h3>
    <textarea id="modalInput"></textarea>
    <div class="modal-actions">
      <button class="m-cancel" onclick="fermerModal()">Annuler</button>
      <button class="m-ok" onclick="validerModal()">Valider</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO = 'accannes-cloud/site-acc';
const FICHIER = 'contenu/pages/histoire.json';
const OAUTH = 'https://decap-oauth.accannes.workers.dev';

let token = null, data = null, sha = null, modif = false, champActuel = null;

function login() {
  const p = window.open(OAUTH + '/auth', 'github-login', 'width=600,height=700');
  let hs = false;
  function handler(e) {
    if (typeof e.data !== 'string') return;
    if (!hs && e.data.indexOf('authorizing:github') !== -1) { hs = true; if (p) p.postMessage('authorizing:github', '*'); return; }
    if (e.data.indexOf('authorization:github:success:') !== -1) {
      try {
        token = JSON.parse(e.data.split('authorization:github:success:')[1]).token;
        window.removeEventListener('message', handler);
        if (p) p.close();
        demarrer();
      } catch (err) { toast('Erreur de connexion', true); }
    }
  }
  window.addEventListener('message', handler);
}

async function demarrer() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.body.classList.add('edit-mode');
  await charger();
}

async function charger() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FICHIER}`, { headers: { 'Authorization': 'token ' + token } });
    const json = await res.json();
    sha = json.sha;
    data = JSON.parse(decodeURIComponent(escape(atob(json.content))));
    afficher();
  } catch (e) { toast('Impossible de charger la page', true); }
}

function afficher() {
  document.querySelectorAll('[data-champ]').forEach(el => {
    const c = el.getAttribute('data-champ');
    el.textContent = data[c] || '';
    el.onclick = () => ouvrirModal('simple', c, null, null, el.textContent);
  });

  // Paragraphes
  const pb = document.getElementById('parasBox');
  pb.innerHTML = '';
  (data.paragraphes || []).forEach((p, i) => {
    const d = document.createElement('div');
    d.innerHTML = `<p class="para editable">${p.texte}</p><button class="tl-suppr" data-psuppr="${i}">🗑️ Supprimer ce paragraphe</button>`;
    d.querySelector('.para').onclick = () => ouvrirModal('liste', 'paragraphes', i, 'texte', p.texte);
    d.querySelector('[data-psuppr]').onclick = () => { data.paragraphes.splice(i,1); maj(); };
    pb.appendChild(d);
  });

  // Photos
  const phb = document.getElementById('photosBox');
  phb.innerHTML = '';
  (data.photos || []).forEach((ph, i) => {
    const d = document.createElement('div');
    d.className = 'archive';
    const img = ph.image
      ? `<div class="archive-img" data-imgupload="${i}"><img src="${imgUrl(ph.image)}" alt=""><span class="badge">📷 Changer</span></div>`
      : `<div class="archive-img vide" data-imgupload="${i}">📷 Cliquer pour ajouter une photo</div>`;
    d.innerHTML = `${img}<div class="archive-cap editable">${ph.legende || '(légende)'}</div><button class="tl-suppr" data-phsuppr="${i}" style="margin:8px 16px;">🗑️ Supprimer cette photo</button>`;
    d.querySelector('[data-imgupload]').onclick = () => choisirImage(chemin => { data.photos[i].image = chemin; maj(); });
    d.querySelector('.archive-cap').onclick = () => ouvrirModal('liste', 'photos', i, 'legende', ph.legende);
    d.querySelector('[data-phsuppr]').onclick = () => { data.photos.splice(i,1); maj(); };
    phb.appendChild(d);
  });

  // Chronologie
  const tb = document.getElementById('timelineBox');
  tb.innerHTML = '';
  (data.chronologie || []).forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'tl-item';
    d.innerHTML = `
      <div class="tl-year editable" data-tly="${i}">${c.annee}</div>
      <div><div class="tl-text editable" data-tlt="${i}">${c.texte}</div>
      <button class="tl-suppr" data-tlsuppr="${i}">🗑️ Supprimer</button></div>`;
    d.querySelector('[data-tly]').onclick = () => ouvrirModal('liste', 'chronologie', i, 'annee', c.annee);
    d.querySelector('[data-tlt]').onclick = () => ouvrirModal('liste', 'chronologie', i, 'texte', c.texte);
    d.querySelector('[data-tlsuppr]').onclick = () => { data.chronologie.splice(i,1); maj(); };
    tb.appendChild(d);
  });
}

function ajouterPara() { if(!data.paragraphes) data.paragraphes=[]; data.paragraphes.push({texte:'Nouveau paragraphe à modifier.'}); maj(); }
function ajouterPhoto() { if(!data.photos) data.photos=[]; data.photos.push({image:'',legende:'Nouvelle légende'}); maj(); }
function ajouterDate() { if(!data.chronologie) data.chronologie=[]; data.chronologie.push({annee:'ANNÉE',texte:'Nouvel événement.'}); maj(); }

function maj() { modif = true; document.getElementById('saveBtn').disabled = false; afficher(); }

function ouvrirModal(type, champ, index, prop, valeur) {
  champActuel = { type, champ, index, prop };
  document.getElementById('modalInput').value = valeur || '';
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalInput').focus();
}
function fermerModal() { document.getElementById('modalBg').classList.remove('open'); champActuel = null; }
function validerModal() {
  const v = document.getElementById('modalInput').value;
  if (champActuel.type === 'simple') data[champActuel.champ] = v;
  else data[champActuel.champ][champActuel.index][champActuel.prop] = v;
  maj();
  fermerModal();
}

function imgUrl(chemin) {
  if (!chemin) return '';
  if (chemin.startsWith('http')) return chemin;
  return `https://raw.githubusercontent.com/${REPO}/main/${chemin}?t=${Date.now()}`;
}

function choisirImage(callback) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1000;
        let { width, height } = img;
        if (width > MAX || height > MAX) { if (width > height) { height = height*MAX/width; width = MAX; } else { width = width*MAX/height; height = MAX; } }
        const cv = document.createElement('canvas'); cv.width = width; cv.height = height;
        cv.getContext('2d').drawImage(img, 0, 0, width, height);
        envoyer(cv.toDataURL('image/jpeg', 0.85).split(',')[1], callback);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function envoyer(base64, callback) {
  toast('⏳ Envoi de la photo...');
  const chemin = 'images/uploads/hist-' + Date.now() + '.jpg';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${chemin}`, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Ajout image histoire', content: base64 })
    });
    if (!res.ok) throw new Error();
    callback(chemin);
    toast('✓ Photo ajoutée');
  } catch (e) { toast('Erreur lors de l\'envoi', true); }
}

async function sauvegarder() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ Enregistrement...';
  try {
    const contenu = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FICHIER}`, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Modification page histoire via éditeur', content: contenu, sha: sha })
    });
    if (!res.ok) throw new Error();
    sha = (await res.json()).content.sha;
    modif = false;
    btn.textContent = '💾 Enregistrer';
    toast('✓ Enregistré ! Le site se met à jour dans 1 minute.');
  } catch (e) {
    btn.disabled = false; btn.textContent = '💾 Enregistrer';
    toast('Erreur lors de l\'enregistrement', true);
  }
}

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => { t.className = 'toast' + (err ? ' error' : ''); }, 4000);
}

window.addEventListener('beforeunload', e => { if (modif) { e.preventDefault(); e.returnValue = ''; } });
</script>
</body>
</html>
